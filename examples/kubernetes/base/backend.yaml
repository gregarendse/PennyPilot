apiVersion: v1
kind: Secret
metadata:
  name: pennypilot-backend
stringData:
  DATABASE_URL: postgres://pennypilot:change-me@postgres:5432/pennypilot?sslmode=disable
  ENCRYPTION_KEY_HEX: replace-with-openssl-rand-hex-32
  MONZO_CLIENT_ID: replace-me
  MONZO_CLIENT_SECRET: replace-me
  TRUELAYER_CLIENT_ID: replace-me
  TRUELAYER_CLIENT_SECRET: replace-me
  FRONTEND_URL: https://pennypilot.example.com
  MONZO_REDIRECT_URL: https://pennypilot.example.com/auth/monzo/callback
  TRUELAYER_REDIRECT_URL: https://pennypilot.example.com/auth/truelayer/callback
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app.kubernetes.io/name: backend
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/OWNER/pennypilot-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - secretRef:
                name: pennypilot-backend
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
