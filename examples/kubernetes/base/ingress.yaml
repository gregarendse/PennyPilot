apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pennypilot
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - pennypilot.example.com
        - api.pennypilot.example.com
      secretName: pennypilot-tls
  rules:
    - host: pennypilot.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  name: http
    - host: api.pennypilot.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  name: http
