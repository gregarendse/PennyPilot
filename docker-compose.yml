services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pennypilot
      POSTGRES_USER: pennypilot
      POSTGRES_PASSWORD: pennypilot
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pennypilot -d pennypilot"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgres://pennypilot:pennypilot@db:5432/pennypilot?sslmode=disable
    ports:
      - "8080:8080"

volumes:
  postgres-data:
