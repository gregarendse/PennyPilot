name: Container images

on:
  pull_request:
    paths:
      - ".github/workflows/container-images.yml"
      - "backend/**"
      - "frontend/**"
      - "docker-compose.yml"
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - ".github/workflows/container-images.yml"
      - "backend/**"
      - "frontend/**"
      - "docker-compose.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: container-images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY_GHCR: ghcr.io

jobs:
  build-and-push:
    name: Build ${{ matrix.service }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: ./backend
            image_suffix: backend
          - service: frontend
            context: ./frontend
            image_suffix: frontend
    env:
      HAS_DOCKERHUB: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image names
        id: image-names
        shell: bash
        env:
          GHCR_OWNER: ${{ github.repository_owner }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          ghcr_owner="${GHCR_OWNER,,}"
          echo "ghcr=ghcr.io/${ghcr_owner}/pennypilot-${{ matrix.image_suffix }}" >> "$GITHUB_OUTPUT"

          if [ -n "$DOCKERHUB_USERNAME" ]; then
            dockerhub_owner="${DOCKERHUB_USERNAME,,}"
            echo "dockerhub=${dockerhub_owner}/pennypilot-${{ matrix.image_suffix }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && env.HAS_DOCKERHUB == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate GHCR metadata
        id: meta-ghcr
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image-names.outputs.ghcr }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Generate Docker Hub metadata
        id: meta-dockerhub
        if: env.HAS_DOCKERHUB == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image-names.outputs.dockerhub }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and optionally push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.meta-ghcr.outputs.tags }}
            ${{ steps.meta-dockerhub.outputs.tags }}
          labels: |
            ${{ steps.meta-ghcr.outputs.labels }}
            org.opencontainers.image.title=PennyPilot ${{ matrix.service }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
